models:
  - name: stg_yellow_trips
    columns:
      - name: trip_id
        description: 'Primary key for the table'
        data_tests:
          - unique
          - not_null
      - name: vendorid
        description: '{{doc("stg_docs")}}'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2]
      - name: fare_amount
        data_tests:
          - not_null
      - name: trip_distance
        data_tests:
          - not_null
      - name: payment_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Flex Fare trip','Credit Card', 'Cash', 'No Charge', 'Dispute', 'Unknown']
      - name: pickup_datetime
        data_tests:
          - not_null